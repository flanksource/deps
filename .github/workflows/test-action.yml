name: Test Action

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-action:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build deps from source
        run: |
          mkdir -p "$HOME/.local/bin"
          go build -o "$HOME/.local/bin/deps" ./cmd/deps

      - name: Test action with multiple tools
        id: install-tools
        uses: ./
        with:
          tools: |
            yq
            kubectl
            helm
            svu
            helm/chart-testing
            python@3.11
          version: latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify yq installation
        shell: bash
        run: |
          yq --version
          svu --version
          python3 --version
          chart-testing version

      - name: Check action outputs
        shell: bash
        run: |
          echo "Tools installed: ${{ steps.install-tools.outputs.tools-installed }}"
